<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StFX Meal Hall</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#e9edf2; /* slightly darker = less white feel */
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,94,184,0.12), transparent 420px),
    radial-gradient(circle at 80% 70%, rgba(228,0,43,0.10), transparent 450px),
    linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.35));
  z-index:-1;
}

/* LOGO */
.logo{
  position:fixed;
  top:18px;
  right:30px;
  width:220px;
  z-index:1000;
}

.logo img{
  width:100%;
  height:auto;
}

/* PAGE SYSTEM */
.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:0.35s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* WELCOME */
#welcome{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  height:100%;
  color:white;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("Morrison%20Hall(1).jpg");

  background-size:cover;
  background-position:center;
  cursor:pointer;
}

.welcome-title{
  font-size:100px;
  font-weight:bold;
  line-height:1.1;
}

.welcome-sub{
  font-size:44px;
  margin-top:25px;
  color:#e6e6e6;
}

/* MENU */
.menu{
  width:1100px;
  max-width:94%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:35px;
  padding-top:140px;
}

/* CARDS */
.card{
  display:flex;
  align-items:center;
  background:#ffffff;
  border-radius:34px;
  padding:45px 50px;
  box-shadow:0 18px 40px rgba(0,0,0,0.18);
  cursor:pointer;
  min-height:180px;
  transition:0.2s ease;

  border-left:12px solid #E4002B; /* Sodexo red accent */
}

.card:hover{
  transform:scale(1.02);
}

.text h2{
  font-size:58px;
  color:#003A70; /* deeper Sodexo-style blue */
  font-weight:800;
}

.text p{
  font-size:30px;
  color:#555;
}

/* PAGE CONTENT */
.page-content{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.coming{
  font-size:72px;
  font-weight:bold;
  color:#003A70;
}

/* BUTTON */
.btn{
  position:absolute;
  bottom:50px;
  left:50%;
  transform:translateX(-50%);
  background:#003A70;
  color:white;
  padding:28px 90px;
  border:none;
  border-radius:30px;
  font-size:34px;
  cursor:pointer;
  transition:0.2s ease;
}

.btn:hover{
  background:#E4002B;
  color:white;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="logo.png" alt="Sodexo Logo">
</div>

<!-- WELCOME -->
<div id="welcome" class="page active" onclick="showPage('menu')">
  <div>
    <div class="welcome-title">
      Welcome to<br>Meal Hall
    </div>
    <div class="welcome-sub">Click to enhance your meal</div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="page">

  <div class="menu">

    <div class="card" onclick="showPage('protein')">
      <div class="text">
        <h2>Add Protein</h2>
        <p>Chicken, eggs, tofu & more</p>
      </div>
    </div>

    <div class="card" onclick="showPage('veg')">
      <div class="text">
        <h2>Add Vegetables</h2>
        <p>Fresh greens & salads</p>
      </div>
    </div>

    <div class="card" onclick="showPage('fibre')">
      <div class="text">
        <h2>Add Fibre</h2>
        <p>Oats, grains & whole foods</p>
      </div>
    </div>

    <div class="card" onclick="showPage('creative')">
      <div class="text">
        <h2>Get Creative</h2>
        <p>Build your own custom meal</p>
      </div>
    </div>

  </div>

</div>

<!-- PROTEIN -->
<div id="protein" class="page">
  <div class="page-content">
    <div class="coming">Coming Soon</div>
  </div>
  <button class="btn" onclick="showPage('menu')">Home</button>
</div>

<!-- VEG -->
<div id="veg" class="page">
  <div class="page-content">
    <div class="coming">Coming Soon</div>
  </div>
  <button class="btn" onclick="showPage('menu')">Home</button>
</div>

<!-- FIBRE -->
<div id="fibre" class="page">
  <div class="page-content">
    <div class="coming">Coming Soon</div>
  </div>
  <button class="btn" onclick="showPage('menu')">Home</button>
</div>

<!-- CREATIVE -->
<div id="creative" class="page">
  <div class="page-content">
    <div class="coming">Coming Soon</div>
  </div>
  <button class="btn" onclick="showPage('menu')">Home</button>
</div>

<script>

let timer;

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  resetTimer();
}

function goHome(){
  showPage("welcome");
}

function resetTimer(){
  clearTimeout(timer);

  timer = setTimeout(()=>{
    goHome();
  }, 20000);
}

["click","touchstart","mousemove"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

</script>

</body>
</html>
