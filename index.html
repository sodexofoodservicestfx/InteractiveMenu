<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StFX Meal Hall</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.60), rgba(0,0,0,0.60)),
    url("Morrison%20Hall(1).jpg");
  background-size:cover;
  background-position:center;
  filter: blur(2px);
  transform: scale(1.05);
  z-index:-1;
}

/* PAGE SYSTEM */
.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:0.35s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* WELCOME */
#welcome{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  height:100%;
  color:white;
  cursor:pointer;
}

.welcome-title{
  font-size:130px;
  font-weight:bold;
  line-height:1.05;
}

.welcome-sub{
  font-size:44px;
  margin-top:25px;
  color:#e6e6e6;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* MENU */
.menu{
  width:1100px;
  max-width:94%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:35px;
  padding-top:140px;
}

/* CARDS */
.card{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.95);
  border-radius:34px;
  padding:45px 50px;
  box-shadow:0 18px 40px rgba(0,0,0,0.35);
  cursor:pointer;
  min-height:180px;
  transition:0.2s ease;
  border-left:12px solid #E4002B;
}

.card:hover{
  transform:scale(1.02);
}

.text h2{
  font-size:58px;
  color:#003A70;
  font-weight:800;
}

.text p{
  font-size:30px;
  color:#444;
}

/* PAGE CONTENT */
.page-content{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.coming{
  font-size:72px;
  font-weight:bold;
  color:#ffffff;
  text-shadow:0 4px 20px rgba(0,0,0,0.6);
}

/* ========================= */
/* 🔻 BOTTOM BAR */
/* ========================= */

.bottom-bar{
  position:fixed;
  bottom:25px;
  left:0;
  right:0;

  display:flex;
  justify-content:space-between;

  padding:0 0;

  z-index:1000;
}

/* shared button style */
.bottom-btn{
  width:220px;
  height:75px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:26px;
  font-weight:bold;

  box-shadow:0 6px 18px rgba(0,0,0,0.25);

  cursor:pointer;
}

/* BACK BUTTON (LEFT EDGE) */
.back-btn{
  background:#ffffff;
  color:#003A70;

  border-radius:0 16px 16px 0;
}

.back-btn:hover{
  background:#E4002B;
  color:white;
}

/* LOGO (RIGHT EDGE) */
.logo-btn{
  background:#ffffff;

  border-radius:16px 0 0 16px;
}

.logo-btn img{
  width:140px;
  display:block;
}

/* hidden on welcome */
.hide{
  display:none !important;
}

</style>
</head>

<body>

<!-- BOTTOM BAR -->
<div id="bottomBar" class="bottom-bar">

  <div class="bottom-btn back-btn" onclick="goBack()">
    ⟵ Back
  </div>

  <div class="bottom-btn logo-btn">
    <img src="logo.png" alt="Sodexo Logo">
  </div>

</div>

<!-- WELCOME -->
<div id="welcome" class="page active" onclick="showPage('menu')">
  <div>
    <div class="welcome-title">
      Welcome to<br>Meal Hall
    </div>
    <div class="welcome-sub">
      Click to enhance your meal
    </div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="page">

  <div class="menu">

    <div class="card" onclick="showPage('protein')">
      <div class="text">
        <h2>Add Protein</h2>
        <p>Chicken, Pork, Eggs & more</p>
      </div>
    </div>

    <div class="card" onclick="showPage('veg')">
      <div class="text">
        <h2>Add Vegetables</h2>
        <p>Fresh greens & salads</p>
      </div>
    </div>

    <div class="card" onclick="showPage('fibre')">
      <div class="text">
        <h2>Add Fibre</h2>
        <p>Oats, grains & whole foods</p>
      </div>
    </div>

    <div class="card" onclick="showPage('creative')">
      <div class="text">
        <h2>Get Creative</h2>
        <p>Build your own custom meal</p>
      </div>
    </div>

  </div>

</div>

<!-- PAGES -->
<div id="protein" class="page">
  <div class="page-content"><div class="coming">Coming Soon</div></div>
</div>

<div id="veg" class="page">
  <div class="page-content"><div class="coming">Coming Soon</div></div>
</div>

<div id="fibre" class="page">
  <div class="page-content"><div class="coming">Coming Soon</div></div>
</div>

<div id="creative" class="page">
  <div class="page-content"><div class="coming">Coming Soon</div></div>
</div>

<script>

let currentPage = "welcome";
let timer;

const bottomBar = document.getElementById("bottomBar");

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  currentPage = id;

  updateUI();
  resetTimer();
}

function goBack(){
  if(currentPage === "menu"){
    showPage("welcome");
  } else {
    showPage("menu");
  }
}

/* ========================= */
/* ⏱️ 20 SECOND TIMEOUT */
/* ========================= */

function resetTimer(){
  clearTimeout(timer);

  timer = setTimeout(()=>{
    showPage("welcome");
  }, 20000); // 🔥 20 seconds
}

/* reset on interaction */
["click","touchstart","mousemove","keydown"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

/* hide bottom bar on welcome */
function updateUI(){
  if(currentPage === "welcome"){
    bottomBar.classList.add("hide");
  } else {
    bottomBar.classList.remove("hide");
  }
}

updateUI();
resetTimer();

</script>

</body>
</html>
