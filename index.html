<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StFX Meal Hall</title>

<style>

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#f6f3ee;
}

/* ================= BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(122,30,44,0.08), transparent 400px),
    radial-gradient(circle at 80% 70%, rgba(76,175,80,0.06), transparent 450px);
  z-index:-1;
}

/* ================= PAGE SYSTEM ================= */

.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:0.35s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ================= TOP BAR ================= */

.topbar{
  height:110px;
  background:#7A1E2C;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:46px;
  font-weight:bold;

  box-shadow:0 4px 18px rgba(0,0,0,0.2);
}

/* ================= WELCOME (CENTERED) ================= */

#welcome{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  height:100%;

  color:white;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=2000&q=80");

  background-size:cover;
  background-position:center;

  cursor:pointer;
}

.welcome-title{
  font-size:100px;
  font-weight:bold;
}

.welcome-sub{
  font-size:44px;
  margin-top:25px;
  opacity:0.95;
}

/* ================= MENU ================= */

.menu{
  width:1100px;
  max-width:94%;
  margin:0 auto;

  display:flex;
  flex-direction:column;
  gap:35px;

  padding-top:140px;
}

/* ================= CARDS ================= */

.card{
  display:flex;
  align-items:center;
  gap:30px;

  background:white;
  border-radius:34px;
  padding:35px;

  box-shadow:0 12px 28px rgba(0,0,0,0.14);
  cursor:pointer;

  min-height:180px;
}

.card:active{
  transform:scale(0.98);
}

.card img{
  width:220px;
  height:150px;
  object-fit:cover;
  border-radius:22px;
}

/* ================= TEXT ================= */

.text h2{
  font-size:56px;
  color:#7A1E2C;
}

.text p{
  font-size:30px;
  color:#555;
}

/* ================= PAGE CONTENT ================= */

.page-content{
  height:calc(100% - 110px);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:30px;
}

/* ================= FIBRE IMAGE ================= */

.fibre-img{
  width:90%;
  max-width:1200px;
  border-radius:30px;
  box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

/* ================= BUTTONS ================= */

.btn{
  position:absolute;
  bottom:50px;

  background:#7A1E2C;
  color:white;

  padding:28px 90px;
  border:none;
  border-radius:30px;

  font-size:34px;
  cursor:pointer;
}

.back{
  left:50%;
  transform:translateX(-50%);
}

/* touch fix */
button, .card {
  touch-action: manipulation;
}

</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="page active" onclick="showPage('menu')">

  <div>
    <div class="welcome-title">Welcome to Meal Hall</div>
    <div class="welcome-sub">Click to enhance your meal</div>
  </div>

</div>

<!-- ================= MENU (NO HOME SCREEN) ================= -->
<div id="menu" class="page">

  <div class="menu">

    <div class="card" onclick="showPage('protein')">
      <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=800&q=80">
      <div class="text">
        <h2>Add Protein</h2>
        <p>Chicken, eggs, tofu & more</p>
      </div>
    </div>

    <div class="card" onclick="showPage('veg')">
      <img src="https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=800&q=80">
      <div class="text">
        <h2>Add Vegetables</h2>
        <p>Fresh greens & salads</p>
      </div>
    </div>

    <div class="card" onclick="showPage('fibre')">
      <img src="https://images.unsplash.com/photo-1604908554165-5f1a9d1b5c2d?auto=format&fit=crop&w=800&q=80">
      <div class="text">
        <h2>Add Fibre</h2>
        <p>Rice, grains & whole foods</p>
      </div>
    </div>

    <div class="card" onclick="showPage('creative')">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80">
      <div class="text">
        <h2>Get Creative</h2>
        <p>Build your own custom meal</p>
      </div>
    </div>

  </div>

</div>

<!-- ================= PAGES ================= -->

<div id="protein" class="page">
  <div class="topbar">Add Protein</div>

  <div class="page-content">
    <div style="font-size:70px;color:#7A1E2C;font-weight:bold;">Coming Soon</div>
  </div>

  <button class="btn back" onclick="showPage('menu')">← Back</button>
</div>

<div id="veg" class="page">
  <div class="topbar">Add Vegetables</div>

  <div class="page-content">
    <div style="font-size:70px;color:#7A1E2C;font-weight:bold;">Coming Soon</div>
  </div>

  <button class="btn back" onclick="showPage('menu')">← Back</button>
</div>

<!-- ================= FIBRE WITH IMAGE ================= -->
<div id="fibre" class="page">
  <div class="topbar">Add Fibre</div>

  <div class="page-content">
    <img class="fibre-img"
         src="https://images.unsplash.com/photo-1604908554165-5f1a9d1b5c2d?auto=format&fit=crop&w=1400&q=80">
  </div>

  <button class="btn back" onclick="showPage('menu')">← Back</button>
</div>

<div id="creative" class="page">
  <div class="topbar">Get Creative</div>

  <div class="page-content">
    <div style="font-size:70px;color:#7A1E2C;font-weight:bold;">Coming Soon</div>
  </div>

  <button class="btn back" onclick="showPage('menu')">← Back</button>
</div>

<script>

let timer;

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  resetTimer();
}

/* ================= 30 SECOND RESET ================= */

function resetTimer(){

  clearTimeout(timer);

  timer = setTimeout(()=>{

    showPage("menu");

    timer = setTimeout(()=>{
      showPage("welcome");
    }, 10000);

  }, 30000);

}

["click","touchstart","mousemove"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

</script>

</body>
</html>
