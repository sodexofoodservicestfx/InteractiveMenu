<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StFX Meal Hall</title>

<style>

/* ================= BASE ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#f6f3ee; /* warm food tone */
}

/* ================= FOOD-THEMED BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:
    radial-gradient(circle at 20% 30%, rgba(122,30,44,0.08), transparent 300px),
    radial-gradient(circle at 80% 70%, rgba(76,175,80,0.06), transparent 350px),
    radial-gradient(circle at 50% 50%, rgba(255,193,7,0.05), transparent 400px);

  z-index:-1;
}

/* ================= PAGE SYSTEM ================= */

.page{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
  transition:0.4s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ================= TOP BAR ================= */

.topbar{
  height:100px;
  background:#7A1E2C; /* StFX maroon */
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:40px;
  font-weight:bold;

  box-shadow:0 4px 18px rgba(0,0,0,0.2);
}

/* ================= WELCOME ================= */

#welcome{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  cursor:pointer;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("images/welcome.jpg");

  background-size:cover;
  background-position:center;

  color:white;
}

.welcome-title{
  font-size:90px;
  font-weight:bold;
}

.welcome-sub{
  font-size:36px;
  opacity:0.9;
  margin-top:20px;
}

/* ================= HOME ================= */

.home{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}

.menu{
  width:1000px;
  max-width:92%;
  display:flex;
  flex-direction:column;
  gap:30px;
}

/* ================= CARDS ================= */

.card{
  display:flex;
  align-items:center;
  gap:30px;

  background:white;
  border-radius:30px;
  padding:25px;

  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  cursor:pointer;

  transition:0.25s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:160px;
  height:120px;
  object-fit:cover;
  border-radius:20px;
}

/* ================= TEXT ================= */

.text h2{
  font-size:44px;
  color:#7A1E2C;
}

.text p{
  font-size:26px;
  color:#555;
}

/* ================= BLANK PAGES ================= */

.blank{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:60px;
  font-weight:bold;
  color:#7A1E2C;
}

/* ================= BACK BUTTON ================= */

.back{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);

  background:#7A1E2C;
  color:white;

  padding:25px 70px;
  border:none;
  border-radius:25px;

  font-size:30px;
  cursor:pointer;
}

/* ================= TOUCH FEEL ================= */

.card:active,
.back:active{
  transform:scale(0.98);
}

</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="page active" onclick="showPage('home')">

  <div>
    <div class="welcome-title">🍽️ StFX Meal Hall</div>
    <div class="welcome-sub">Tap Anywhere to Begin</div>
  </div>

</div>

<!-- ================= HOME ================= -->
<div id="home" class="page">

  <div class="topbar">Build Your Plate</div>

  <div class="home">

    <div class="menu">

      <div class="card" onclick="showPage('protein')">
        <img src="images/protein.jpg">
        <div class="text">
          <h2>Add Protein</h2>
          <p>Chicken, eggs, tofu & more</p>
        </div>
      </div>

      <div class="card" onclick="showPage('veg')">
        <img src="images/vegetables.jpg">
        <div class="text">
          <h2>Add Vegetables</h2>
          <p>Fresh, healthy greens daily</p>
        </div>
      </div>

      <div class="card" onclick="showPage('fibre')">
        <img src="images/fibre.jpg">
        <div class="text">
          <h2>Add Fibre</h2>
          <p>Rice, grains & whole foods</p>
        </div>
      </div>

    </div>

  </div>

</div>

<!-- ================= PROTEIN ================= -->
<div id="protein" class="page">
  <div class="topbar">Add Protein</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">Back</button>
</div>

<!-- ================= VEG ================= -->
<div id="veg" class="page">
  <div class="topbar">Add Vegetables</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">Back</button>
</div>

<!-- ================= FIBRE ================= -->
<div id="fibre" class="page">
  <div class="topbar">Add Fibre</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">Back</button>
</div>

<script>

let timer;

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  resetTimer();
}

function resetTimer(){

  clearTimeout(timer);

  timer = setTimeout(()=>{
    showPage("welcome");
  },60000);

}

document.addEventListener("click", resetTimer);
document.addEventListener("touchstart", resetTimer);

resetTimer();

</script>

</body>
</html>
